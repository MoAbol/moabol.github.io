<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vertical Letter Scroll</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --ink: #111111;
      --border: #111111;
      --speed: 18s;
      --letter-size: clamp(36px, 4vw, 64px);
      --gap: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--ink);
    }

    .frame {
      width: min(92vw, 520px);
      height: min(92vh, 900px);
      margin: auto;
      position: absolute;
      inset: 0;
      border: 3px solid var(--border);
      border-radius: 28px;
      overflow: hidden;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.35);
    }

    .ticker {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .ticker__viewport {
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 0;
    }

    .ticker__track {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--gap);
      will-change: transform;
      animation: scrollUp var(--speed) linear infinite;
    }

    .ticker__group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--gap);
    }

    .letter {
      font-size: var(--letter-size);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      user-select: none;
    }

    @keyframes scrollUp {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(-50%);
      }
    }

    /* optional: subtle visual depth */
    .fade-top,
    .fade-bottom {
      position: absolute;
      left: 0;
      right: 0;
      height: 80px;
      pointer-events: none;
      z-index: 2;
    }

    .fade-top {
      top: 0;
      background: linear-gradient(to bottom, var(--bg), rgba(244,241,234,0));
    }

    .fade-bottom {
      bottom: 0;
      background: linear-gradient(to top, var(--bg), rgba(244,241,234,0));
    }

    /* Slight motion-reduction support */
    @media (prefers-reduced-motion: reduce) {
      .ticker__track {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="fade-top"></div>
    <div class="fade-bottom"></div>

    <div class="ticker">
      <div class="ticker__viewport">
        <div class="ticker__track" id="track">
          <div class="ticker__group" id="groupA"></div>
          <div class="ticker__group" id="groupB" aria-hidden="true"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const text = "LETSLEARN";
    const repeatCount = 14;

    const groupA = document.getElementById("groupA");
    const groupB = document.getElementById("groupB");

    function fillGroup(group) {
      for (let i = 0; i < repeatCount; i++) {
        for (const ch of text) {
          const span = document.createElement("div");
          span.className = "letter";
          span.textContent = ch;
          group.appendChild(span);
        }
      }
    }

    fillGroup(groupA);
    fillGroup(groupB);
  </script>
</body>
</html>
