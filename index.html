<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>H3NBUG | Absolute Mode</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@900&family=Inter:wght@400;700&family=Fira+Code&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  
  <style>
    :root {
      --navy: #050B14;
      --cream: #FFFFD2;
      --gap: 12px;
      --ribbon-w: 60px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--navy);
      color: var(--navy);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .stage {
      display: grid;
      grid-template-columns: minmax(320px, 550px) 1fr;
      height: 100vh;
      gap: var(--gap);
      padding: var(--gap);
      padding-right: calc(var(--ribbon-w) + var(--gap));
    }

    .panel-left {
      background: var(--cream);
      border-radius: 16px;
      padding: 80px 60px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 10;
      min-width: 0;
      overflow: hidden;
    }

    .brand h1 {
      font-family: 'Prompt';
      font-size: 90px;
      line-height: 0.8;
      margin: 15px 0 10px 0;
      font-weight: 900;
    }

    .menu {
      list-style: none;
      margin: 40px 0;
    }

    .menu a {
      text-decoration: none;
      color: var(--navy);
      font-family: 'Fira Code', monospace;
      font-size: 22px;
      display: inline-block;
      transition: 0.2s;
    }

    .menu a:hover {
      transform: translateX(10px);
    }

    .panel-right-container {
      background: var(--cream);
      padding: 12px;
      height: 100%;
      display: flex;
      min-width: 0;
      overflow: hidden;
    }

    .inner-frame {
      flex: 1;
      background: var(--navy);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
    }

    #random-grid {
  position: absolute;
  inset: 0;
  z-index: 1;
  opacity: 0.55;
  pointer-events: none;

  -webkit-mask-image: linear-gradient(
  135deg,
  rgba(0,0,0,0) 0%,
  rgba(0,0,0,0.15) 20%,
  rgba(0,0,0,0.45) 35%,
  rgba(0,0,0,0.8) 50%,
  rgba(0,0,0,1) 65%,
  rgba(0,0,0,1) 100%
);
mask-image: linear-gradient(
  135deg,
  rgba(0,0,0,0) 0%,
  rgba(0,0,0,0.15) 20%,
  rgba(0,0,0,0.45) 35%,
  rgba(0,0,0,0.8) 50%,
  rgba(0,0,0,1) 65%,
  rgba(0,0,0,1) 100%
);
}

    .portrait {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 94%;
      width: auto;
      max-width: none;
      z-index: 5; /* لایه بالاتر از گرید */
      pointer-events: none;

      -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 95%);
      mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 94%);
    }
    .ribbon {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: var(--ribbon-w);
      background: var(--cream);
      overflow: hidden;
      z-index: 100;
    }

    .ribbon-wrapper {
      display: flex;
      flex-direction: column;
      will-change: transform;
    }

    .ribbon-text {
  font-family: 'Prompt';
  font-size: 97px;
  font-weight: 900;
  writing-mode: vertical-rl;
  white-space: nowrap;
  padding: 0;
  padding-left: 78px;
  line-height: 1;
  }

    @media (max-width: 960px) {
      .stage {
        grid-template-columns: 1fr;
        height: auto;
        overflow-y: auto;
      }

      .ribbon {
        top: auto;
        left: 0;
        bottom: 0;
        width: 100%;
        height: var(--ribbon-w);
      }

      .ribbon-wrapper {
        flex-direction: row;
      }

      .ribbon-text {
        writing-mode: horizontal-tb;
        padding: 0 30px;
      }
    }
  </style>
</head>
<body>

  <div class="stage">
    <aside class="panel-left">
      <div class="brand">
        <h2 style="font-size: 14px; letter-spacing: 2px;">MOHAMMAD ABOLHASANI</h2>
        <h1>H3NBUG</h1>
        <p style="font-family: 'Fira Code'; opacity: 0.7;">Chaos with purpose.</p>
      </div>

      <ul class="menu">
        <li><a href="https://github.com/moabol" target="_blank">→ GitHub</a></li>
        <li><a href="#">→ YouTube</a></li>
        <li><a href="#">→ LinkedIn</a></li>
      </ul>

      <div class="footer-id">MABOL.XYZ</div>
    </aside>

    <main class="panel-right-container">
      <div class="inner-frame" id="interactive-frame">
        <canvas id="random-grid"></canvas>
        <img src="GHpage_001.png" class="portrait" alt="H3NBUG">
      </div>
    </main>
  </div>

  <aside class="ribbon">
    <div class="ribbon-wrapper" id="ribbon-animate">
      <div class="ribbon-text">WATCH&LEARN&nbsp;</div>
      <div class="ribbon-text">WATCH&LEARN&nbsp;</div>
      <div class="ribbon-text">WATCH&LEARN&nbsp;</div>
      <div class="ribbon-text">WATCH&LEARN&nbsp;</div>
    </div>
  </aside>

  <script>
    // =========================
    // 1) RANDOM GRID + MOUSE INTERACTION
    // =========================
    const canvas = document.getElementById('random-grid');
    const ctx = canvas.getContext('2d');
    const frame = document.getElementById('interactive-frame');

    let mouse = {
      x: -9999,
      y: -9999,
      active: false
    };

    let cols = [];
    let rows = [];
    let rafPending = false;

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = frame.getBoundingClientRect();

      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      buildGrid(rect.width, rect.height);
      drawGrid();
    }

    function randomStep(min, max) {
      return Math.random() * (max - min) + min;
    }

    function buildGrid(width, height) {
      cols = [];
      rows = [];

      let x = 0;
      while (x <= width) {
        cols.push({
          pos: x,
          width: Math.random() * 1.2 + 0.2,
          alpha: Math.random() * 0.12 + 0.04
        });
        x += randomStep(38, 72);
      }

      let y = 0;
      while (y <= height) {
        rows.push({
          pos: y,
          width: Math.random() * 1.2 + 0.2,
          alpha: Math.random() * 0.12 + 0.04
        });
        y += randomStep(38, 72);
      }
    }

    function drawGrid() {
      const rect = frame.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;

      ctx.clearRect(0, 0, w, h);

      for (const col of cols) {
        const dist = Math.abs(mouse.x - col.pos);
        const boost = mouse.active ? Math.max(0, 1 - dist / 180) : 0;
        const alpha = Math.min(col.alpha + boost * 0.22, 0.32);
        const lineW = col.width + boost * 1.4;

        ctx.beginPath();
        ctx.strokeStyle = `rgba(255,255,210,${alpha})`;
        ctx.lineWidth = lineW;
        ctx.moveTo(col.pos, 0);
        ctx.lineTo(col.pos, h);
        ctx.stroke();
      }

      for (const row of rows) {
        const dist = Math.abs(mouse.y - row.pos);
        const boost = mouse.active ? Math.max(0, 1 - dist / 180) : 0;
        const alpha = Math.min(row.alpha + boost * 0.22, 0.32);
        const lineW = row.width + boost * 1.4;

        ctx.beginPath();
        ctx.strokeStyle = `rgba(255,255,210,${alpha})`;
        ctx.lineWidth = lineW;
        ctx.moveTo(0, row.pos);
        ctx.lineTo(w, row.pos);
        ctx.stroke();
      }
    }

    function requestGridDraw() {
      if (rafPending) return;
      rafPending = true;
      requestAnimationFrame(() => {
        drawGrid();
        rafPending = false;
      });
    }

    frame.addEventListener('mousemove', (e) => {
      const rect = frame.getBoundingClientRect();
      mouse.x = e.clientX - rect.left;
      mouse.y = e.clientY - rect.top;
      mouse.active = true;
      requestGridDraw();
    });

    frame.addEventListener('mouseleave', () => {
      mouse.x = -9999;
      mouse.y = -9999;
      mouse.active = false;
      requestGridDraw();
    });

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // =========================
    // 2) RIBBON ANIMATION WITH FIXED SPEED
    // =========================
    const wrapper = document.getElementById('ribbon-animate');
    wrapper.innerHTML += wrapper.innerHTML;

    const isMobile = window.innerWidth <= 960;
    const distance = isMobile ? (wrapper.scrollWidth / 2) : (wrapper.scrollHeight / 2);
    const pixelsPerSecond = 63;
    const dynamicDuration = (distance / pixelsPerSecond) * 1000;

    anime({
      targets: '#ribbon-animate',
      translateY: isMobile ? [0, '-50%'] : [0, '-50%'],
      translateX: isMobile ? [0, '-50%'] : 0,
      duration: dynamicDuration,
      easing: 'linear',
      loop: true
    });
  </script>
</body>
</html>
