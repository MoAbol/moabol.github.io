<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>H3NBUG</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800;900&family=Prompt:wght@700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #000c1d;
      --cream: #fbffc4;

      --page-pad: 18px;
      --panel-gap: 12px;
      --radius: 16px;

      --left-col: 33.5fr;
      --center-col: 61.5fr;
      --right-col: 5fr;

      --left-pad-y: 78px;
      --left-pad-x: 58px;

      --name-size: 34.5px;
      --logo-size: 120px;
      --tagline-size: 22px;
      --menu-size: 26px;
      --footer-size: 16px;

      --menu-gap: 32px;
      --ribbon-size: 121px;

      --frame-max-w: 1920px;
      --frame-h: calc(100vh - (var(--page-pad) * 2));
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body { background: var(--navy); color: var(--navy); font-family: "Inter", sans-serif; overflow: hidden; }

    .stage { width: 100vw; height: 100vh; padding: var(--page-pad); background: var(--navy); }

    .frame {
      width: 100%; max-width: var(--frame-max-w); height: var(--frame-h);
      margin: 0 auto; display: grid;
      grid-template-columns: var(--left-col) var(--center-col) var(--right-col);
      gap: var(--panel-gap); align-items: stretch;
    }

    .panel { border-radius: var(--radius); overflow: hidden; position: relative; }

    /* LEFT PANEL */
    .left {
      background: var(--cream); padding: var(--left-pad-y) var(--left-pad-x);
      display: flex; flex-direction: column; min-width: 0;
    }

    .identity { flex: 0 0 auto; }
    .name { font-size: var(--name-size); line-height: 1.1; font-weight: 300; letter-spacing: 0.055em; text-transform: uppercase; color: var(--navy); opacity: 0.92; margin-bottom: -10px; }
    .logo { font-family: "Prompt", sans-serif; font-size: var(--logo-size); line-height: 0.95; font-weight: 900; letter-spacing: -0.03em; color: var(--navy); }
    .tagline { font-size: var(--tagline-size); line-height: 1.25; font-weight: 400; color: var(--navy); opacity: 0.92; }

    .menu { list-style: none; margin-top: auto; margin-bottom: 80px; display: flex; flex-direction: column; gap: var(--menu-gap); }
    .menu a { text-decoration: none; color: var(--navy); font-family: "Fira Code", monospace; font-size: var(--menu-size); line-height: 1; font-weight: 400; display: inline-flex; align-items: center; transition: transform 160ms ease, opacity 160ms ease; }
    .menu a::before { content: "-> "; white-space: pre; }
    .menu a:hover { transform: translateX(6px); opacity: 0.75; }

    .footer-mark { display: flex; align-items: center; gap: 14px; margin-top: auto; color: var(--navy); opacity: 0.72; font-family: "Fira Code", monospace; font-size: var(--footer-size); white-space: nowrap; }
    .footer-mark::before, .footer-mark::after { content: ""; height: 1px; background: var(--navy); opacity: 0.35; flex: 1; }

    /* CENTER PANEL */
    .center { background: var(--navy); border-radius: var(--radius); display: flex; align-items: flex-end; justify-content: flex-start; }
    .portrait { height: 95%; max-width: 72%; object-fit: contain; object-position: left bottom; margin-left: 3.8%; filter: grayscale(1) contrast(1.55) brightness(1.02); mix-blend-mode: screen; opacity: 0.98; }

    /* RIGHT RIBBON */
    .ribbon { background: var(--cream); border-radius: 0 !important; overflow: hidden; padding: 0; }
    .ribbon-track {
      display: flex; flex-direction: column; align-items: center;
      animation: scrollUp 15s linear infinite;
    }
    .ribbon-text {
      color: var(--navy); font-family: "Prompt", sans-serif; font-size: var(--ribbon-size);
      font-weight: 900; writing-mode: vertical-rl; text-orientation: mixed;
      white-space: nowrap; user-select: none; padding: 20px 0;
    }
    @keyframes scrollUp { from { transform: translateY(0); } to { transform: translateY(-50%); } }

    /* RESPONSIVE */
    @media (max-width: 1400px) {
      :root { --ribbon-size: 28px; }
    }
  </style>
</head>

<body>
  <main class="stage">
    <section class="frame">
      <aside class="panel left">
        <div class="identity">
          <div class="name">MOHAMMAD ABOLHASANI</div>
          <h1 class="logo">H3NBUG</h1>
          <p class="tagline">Chaos with purpose.</p>
        </div>
        <ul class="menu">
          <li><a href="https://github.com/h3nbug" target="_blank">GitHub</a></li>
          <li><a href="#">YouTube</a></li>
          <li><a href="#">Instagram</a></li>
          <li><a href="#">LinkedIn</a></li>
          <li><a href="#">X</a></li>
        </ul>
        <div class="footer-mark">
          <span>MABOL.XYZ</span>
        </div>
      </aside>

      <section class="panel center">
        <img class="portrait" src="GHpage_001.png" alt="Portrait" />
      </section>

      <aside class="panel ribbon">
        <div class="ribbon-track">
            <div class="ribbon-text">WATCH&LEARN WATCH&LEARN WATCH&LEARN WATCH&LEARN</div>
            <div class="ribbon-text">WATCH&LEARN WATCH&LEARN WATCH&LEARN WATCH&LEARN</div>
        </div>
      </aside>
    </section>
  </main>
</body>
</html>
