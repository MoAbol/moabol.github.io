<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>H3NBUG | Absolute Mode</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@900&family=Inter:wght@400;700&family=Fira+Code&display=swap" rel="stylesheet">
  <!-- Anime.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  
  <style>
    :root {
      --navy: #050B14;
      --cream: #FFFFD2;
      --gap: 12px;
      --ribbon-w: 60px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--navy); color: var(--navy); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

    .stage {
      display: grid;
      grid-template-columns: 550px 1fr;
      height: 100vh;
      gap: var(--gap);
      padding: var(--gap);
      padding-right: calc(var(--ribbon-w) + var(--gap));
    }

    .panel-left {
      background: var(--cream);
      border-radius: 16px;
      padding: 80px 60px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 10;
    }

    .brand h1 { font-family: 'Prompt'; font-size: 90px; line-height: 0.8; margin: 15px 0 10px 0; font-weight: 900; }
    .menu { list-style: none; margin: 40px 0; }
    .menu a { text-decoration: none; color: var(--navy); font-family: 'Fira Code', monospace; font-size: 22px; display: inline-block; transition: 0.2s; }
    .menu a:hover { transform: translateX(10px); }

    .panel-right-container {
      background: var(--cream);
      padding: 12px;
      height: 100%;
      display: flex;
    }

    .inner-frame {
      flex: 1;
      background: var(--navy);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }

    /* گرید پشت پرتره */
    #random-grid {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0.4;
    }

    .portrait {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 94%;
      z-index: 2; /* روی گرید */
      pointer-events: none;
      -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 95%);
      mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 95%);
    }

    /* Ribbon Styles */
    .ribbon {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: var(--ribbon-w);
      background: var(--cream);
      overflow: hidden;
      z-index: 100;
    }

    .ribbon-wrapper {
      display: flex;
      flex-direction: column;
      will-change: transform;
    }

    .ribbon-text {
      font-family: 'Prompt';
      font-size: 82px;
      font-weight: 900;
      writing-mode: vertical-rl;
      white-space: nowrap;
      padding: 0 0;
      line-height: 1;
    }

    @media (max-width: 960px) {
      .stage { grid-template-columns: 1fr; height: auto; overflow-y: auto; }
      .ribbon { top: auto; left: 0; bottom: 0; width: 100%; height: var(--ribbon-w); }
      .ribbon-wrapper { flex-direction: row; }
      .ribbon-text { writing-mode: horizontal-tb; padding: 0 30px; }
    }
  </style>
</head>
<body>

  <div class="stage">
    <aside class="panel-left">
      <div class="brand">
        <h2 style="font-size: 14px; letter-spacing: 2px;">MOHAMMAD ABOLHASANI</h2>
        <h1>H3NBUG</h1>
        <p style="font-family: 'Fira Code'; opacity: 0.7;">Chaos with purpose.</p>
      </div>
      <ul class="menu">
        <li><a href="https://github.com/moabol" target="_blank">→ GitHub</a></li>
        <li><a href="#">→ YouTube</a></li>
        <li><a href="#">→ LinkedIn</a></li>
      </ul>
      <div class="footer-id">MABOL.XYZ</div>
    </aside>

    <main class="panel-right-container">
      <div class="inner-frame">
        <canvas id="random-grid"></canvas>
        <img src="GHpage_001.png" class="portrait" alt="H3NBUG">
      </div>
    </main>
  </div>

  <aside class="ribbon">
    <div class="ribbon-wrapper" id="ribbon-animate">
      <div class="ribbon-text">WATCH&LEARN&nbsp;</div>
      <div class="ribbon-text">WATCH&LEARN&nbsp;</div>
      <div class="ribbon-text">WATCH&LEARN&nbsp;</div>
      <div class="ribbon-text">WATCH&LEARN&nbsp;</div>
    </div>
  </aside>

  <script>
    // 1. گرید رندوم با Canvas
    const canvas = document.getElementById('random-grid');
    const ctx = canvas.getContext('2d');
    function drawGrid() {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      ctx.strokeStyle = '#FFFFD2';
      const spacing = 50;
      
      for (let x = 0; x < canvas.width; x += spacing) {
        ctx.beginPath();
        ctx.lineWidth = Math.random() * 0.8;
        ctx.globalAlpha = Math.random() * 0.15;
        ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += spacing) {
        ctx.beginPath();
        ctx.lineWidth = Math.random() * 0.8;
        ctx.globalAlpha = Math.random() * 0.15;
        ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }
    drawGrid();
    window.addEventListener('resize', drawGrid);

    // 2. انیمیشن ریبون با Anime.js (Seamless Loop)
    const wrapper = document.getElementById('ribbon-animate');
    // کپی کردن محتوا برای لوپ بی‌نهایت
    wrapper.innerHTML += wrapper.innerHTML; 

    const isMobile = window.innerWidth <= 960;
    
    anime({
      targets: '#ribbon-animate',
      translateY: isMobile ? 0 : [0, '-50%'],
      translateX: isMobile ? [0, '-50%'] : 0,
      duration: 15000,
      easing: 'linear',
      loop: true
    });
  </script>
</body>
</html>
