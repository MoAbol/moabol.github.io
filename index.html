<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>H3NBUG | Absolute Mode</title>

  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@900&family=Inter:wght@400;700&family=Fira+Code&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

  <style>
    :root {
      --navy: #050B14;
      --cream: #FFFFD2;
      --gap: clamp(10px, 1.2vw, 14px);
      --ribbon-w: clamp(48px, 4.2vw, 64px);
      --radius: 16px;
      --left-min: 300px;
      --left-max: 560px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--navy);
      color: var(--navy);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100dvh;
      display: grid;
      grid-template-columns: minmax(var(--left-min), var(--left-max)) 1fr;
      gap: var(--gap);
      padding: var(--gap);
      padding-right: calc(var(--ribbon-w) + var(--gap));
      overflow: hidden;
    }

    .panel-left {
      background: var(--cream);
      border-radius: var(--radius);
      padding: clamp(28px, 4vw, 80px) clamp(22px, 3vw, 60px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
      overflow: hidden;
      z-index: 10;
    }

    .brand h2 {
      font-size: clamp(12px, 1.2vw, 14px);
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .brand h1 {
      font-family: 'Prompt', sans-serif;
      font-size: clamp(62px, 7vw, 96px);
      line-height: 0.82;
      margin: 10px 0 12px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .brand p {
      font-family: 'Fira Code', monospace;
      opacity: 0.7;
      font-size: clamp(12px, 1.4vw, 16px);
    }

    .menu {
      list-style: none;
      margin: clamp(24px, 4vw, 40px) 0;
      display: grid;
      gap: 12px;
    }

    .menu a {
      text-decoration: none;
      color: var(--navy);
      font-family: 'Fira Code', monospace;
      font-size: clamp(16px, 2vw, 22px);
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .menu a:hover {
      transform: translateX(10px);
    }

    .footer-id {
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      opacity: 0.75;
    }

    .panel-right-container {
      background: var(--cream);
      border-radius: var(--radius);
      padding: var(--gap);
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      display: flex;
    }

    .inner-frame {
      position: relative;
      flex: 1;
      min-width: 0;
      min-height: 0;
      border-radius: calc(var(--radius) - 2px);
      overflow: hidden;
      background: var(--navy);
      isolation: isolate;
    }

    #random-grid {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      opacity: 0.6;
      -webkit-mask-image: linear-gradient(
        135deg,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0.08) 18%,
        rgba(0,0,0,0.35) 32%,
        rgba(0,0,0,0.8) 48%,
        rgba(0,0,0,1) 64%,
        rgba(0,0,0,1) 100%
      );
      mask-image: linear-gradient(
        135deg,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0.08) 18%,
        rgba(0,0,0,0.35) 32%,
        rgba(0,0,0,0.8) 48%,
        rgba(0,0,0,1) 64%,
        rgba(0,0,0,1) 100%
      );
    }

    .portrait {
      position: absolute;
      left: 0;
      bottom: 0;
      height: 96%;
      width: auto;
      max-width: none;
      z-index: 5;
      pointer-events: none;
      user-select: none;

      -webkit-mask-image: linear-gradient(
        to top,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) 16%,
        rgba(0,0,0,0.92) 30%,
        rgba(0,0,0,0.55) 62%,
        rgba(0,0,0,0) 100%
      );
      mask-image: linear-gradient(
        to top,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) 16%,
        rgba(0,0,0,0.92) 30%,
        rgba(0,0,0,0.55) 62%,
        rgba(0,0,0,0) 100%
      );
    }

    .ribbon {
      position: fixed;
      top: 0;
      right: 0;
      width: var(--ribbon-w);
      height: 100dvh;
      background: var(--cream);
      overflow: hidden;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ribbon-track {
      display: flex;
      flex-direction: column;
      will-change: transform;
    }

    .ribbon-text {
      font-family: 'Prompt', sans-serif;
      font-size: clamp(64px, 7vw, 98px);
      font-weight: 900;
      writing-mode: vertical-rl;
      white-space: nowrap;
      line-height: 1;
      padding-left: 0px;
      letter-spacing: -0.03em;
    }

    @media (max-width: 960px) {
      body {
        position: fixed;
        inset: 0;
      }

      .stage {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        padding-right: var(--gap);
        padding-bottom: calc(var(--ribbon-w) + var(--gap));
      }

      .panel-left {
        min-height: 0;
      }

      .panel-right-container {
        min-height: 0;
      }

      .ribbon {
        top: auto;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: var(--ribbon-w);
      }

      .ribbon-track {
        flex-direction: row;
      }

      .ribbon-text {
        writing-mode: horizontal-tb;
        padding-left: 0;
        padding: 0 28px;
        font-size: clamp(24px, 6vw, 36px);
      }

      .portrait {
        height: 100%;
        max-height: none;
        left: 50%;
        transform: translateX(-50%);
        object-fit: cover;
        object-position: left bottom;
      }

      .menu {
        margin: 18px 0;
      }
    }

    @media (max-width: 640px) {
      .stage {
        padding: 8px;
        padding-bottom: calc(var(--ribbon-w) + 8px);
        gap: 8px;
      }

      .panel-left {
        padding: 20px 18px;
      }

      .brand h1 {
        font-size: clamp(52px, 16vw, 72px);
      }

      .portrait {
        height: 100%;
        left: 0;
        transform: none;
        object-position: left bottom;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <aside class="panel-left">
      <div class="brand">
        <h2>MOHAMMAD ABOLHASANI</h2>
        <h1>H3NBUG</h1>
        <p>Chaos with purpose.</p>
      </div>

      <ul class="menu">
        <li><a href="https://github.com/moabol" target="_blank">→ GitHub</a></li>
        <li><a href="#">→ YouTube</a></li>
        <li><a href="#">→ LinkedIn</a></li>
      </ul>

      <div class="footer-id">MABOL.XYZ</div>
    </aside>

    <main class="panel-right-container">
      <div class="inner-frame" id="interactive-frame">
        <canvas id="random-grid"></canvas>
        <img src="GHpage_001.png" class="portrait" alt="H3NBUG">
      </div>
    </main>
  </div>

  <aside class="ribbon">
    <div class="ribbon-track" id="ribbon-track">
      <div class="ribbon-text">WATCH&LEARN</div>
      <div class="ribbon-text">WATCH&LEARN</div>
      <div class="ribbon-text">WATCH&LEARN</div>
      <div class="ribbon-text">WATCH&LEARN</div>
    </div>
  </aside>

  <script>
    // ===== GRID =====
    const canvas = document.getElementById('random-grid');
    const ctx = canvas.getContext('2d');
    const frame = document.getElementById('interactive-frame');

    let cols = [];
    let rows = [];
    let mouse = { x: -9999, y: -9999, active: false };
    let rafPending = false;

    function randomStep(min, max) {
      return Math.random() * (max - min) + min;
    }

    function buildGrid(width, height) {
      cols = [];
      rows = [];

      let x = 0;
      while (x <= width) {
        cols.push({
          pos: x,
          width: Math.random() * 1.2 + 0.2,
          alpha: Math.random() * 0.12 + 0.04
        });
        x += randomStep(38, 72);
      }

      let y = 0;
      while (y <= height) {
        rows.push({
          pos: y,
          width: Math.random() * 1.2 + 0.2,
          alpha: Math.random() * 0.12 + 0.04
        });
        y += randomStep(38, 72);
      }
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = frame.getBoundingClientRect();

      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      buildGrid(rect.width, rect.height);
      drawGrid();
    }

    function drawGrid() {
      const rect = frame.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;

      ctx.clearRect(0, 0, w, h);

      for (const col of cols) {
        const dist = Math.abs(mouse.x - col.pos);
        const boost = mouse.active ? Math.max(0, 1 - dist / 180) : 0;
        const alpha = Math.min(col.alpha + boost * 0.22, 0.32);
        const lineW = col.width + boost * 1.4;

        ctx.beginPath();
        ctx.strokeStyle = `rgba(255,255,210,${alpha})`;
        ctx.lineWidth = lineW;
        ctx.moveTo(col.pos, 0);
        ctx.lineTo(col.pos, h);
        ctx.stroke();
      }

      for (const row of rows) {
        const dist = Math.abs(mouse.y - row.pos);
        const boost = mouse.active ? Math.max(0, 1 - dist / 180) : 0;
        const alpha = Math.min(row.alpha + boost * 0.22, 0.32);
        const lineW = row.width + boost * 1.4;

        ctx.beginPath();
        ctx.strokeStyle = `rgba(255,255,210,${alpha})`;
        ctx.lineWidth = lineW;
        ctx.moveTo(0, row.pos);
        ctx.lineTo(w, row.pos);
        ctx.stroke();
      }
    }

    function scheduleDraw() {
      if (rafPending) return;
      rafPending = true;
      requestAnimationFrame(() => {
        drawGrid();
        rafPending = false;
      });
    }

    frame.addEventListener('mousemove', (e) => {
      const rect = frame.getBoundingClientRect();
      mouse.x = e.clientX - rect.left;
      mouse.y = e.clientY - rect.top;
      mouse.active = true;
      scheduleDraw();
    });

    frame.addEventListener('mouseleave', () => {
      mouse.x = -9999;
      mouse.y = -9999;
      mouse.active = false;
      scheduleDraw();
    });

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ===== RIBBON =====
    const track = document.getElementById('ribbon-track');
    track.innerHTML += track.innerHTML;

    function startRibbon() {
      anime.remove(track);

      const isMobile = window.innerWidth <= 960;
      const distance = isMobile ? track.scrollWidth / 2 : track.scrollHeight / 2;
      const pixelsPerSecond = 60;
      const duration = (distance / pixelsPerSecond) * 1000;

      anime({
        targets: track,
        translateY: isMobile ? 0 : [0, '-50%'],
        translateX: isMobile ? [0, '-50%'] : 0,
        duration,
        easing: 'linear',
        loop: true
      });
    }

    startRibbon();
    window.addEventListener('resize', startRibbon);
  </script>
</body>
</html>
